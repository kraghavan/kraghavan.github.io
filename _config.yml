remote_theme: "mmistakes/minimal-mistakes@4.24.0"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

title: Karthika Raghavan
subtitle: "Infrastructure & AI Systems"
name: Karthika Raghavan
description: "Engineering blog on distributed systems, LLM infrastructure, and observability"
url: "https://kraghavan.github.io"
minimal_mistakes_skin: "dark"

author:
  name: "Karthika Raghavan"
  bio: "Senior Software Engineer • Distributed Systems • LLM Infrastructure"
  location: "Vancouver, BC"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kraghavan"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/karthikaramalingam"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      share: true
      toc: true
      toc_sticky: true
      header:
        overlay_color: "#1a1a2e"
